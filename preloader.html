<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #d946ef 100%);
            border-radius: 22px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: 700;
            font-size: 32px;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: #f1f5f9;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #d946ef);
            border-radius: 10px;
            position: absolute;
            left: -100%;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        @keyframes loading {
            0% {
                left: -100%;
                width: 30%;
            }

            50% {
                left: 0%;
                width: 100%;
            }

            100% {
                left: 100%;
                width: 30%;
            }
        }

        .status {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">S</div>
        <div class="brand">Synapse HMS</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <div class="status">Initializing System...</div>
    </div>
</body>

</html>
